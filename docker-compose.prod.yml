# Production-oriented Compose file.
# Assumes PostgreSQL and object storage are managed outside this Compose project.
name: quizchef-prod

services:
  backend:
    image: ${BACKEND_IMAGE:-quizchef-backend:prod}
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SERVER_PORT: ${SERVER_PORT:-8080}
      DB_URL: ${DB_URL:?DB_URL is required}
      DB_USERNAME: ${DB_USERNAME:?DB_USERNAME is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT15M}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:?MINIO_ENDPOINT is required}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:?MINIO_BUCKET is required}
    init: true
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:${SERVER_PORT:-8080}"
    networks:
      - quizchef-prod
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${SERVER_PORT:-8080}/actuator/health/readiness || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    image: ${FRONTEND_IMAGE:-quizchef-frontend:prod}
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_WS_URL: ${VITE_WS_URL:-}
    environment:
      PORT: ${FRONTEND_CONTAINER_PORT:-8080}
    depends_on:
      backend:
        condition: service_healthy
    init: true
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_CONTAINER_PORT:-8080}"
    networks:
      - quizchef-prod
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:$${PORT:-8080}/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  quizchef-prod:
    driver: bridge

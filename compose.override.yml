# Local development overrides, merged automatically by `docker compose up`.
# Publishes every service on the host so contributors can reach them directly.
services:
  postgres:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"

  minio:
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  backend:
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    ports:
      - "${FRONTEND_PORT:-3000}:8080"

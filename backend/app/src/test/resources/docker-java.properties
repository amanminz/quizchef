# Docker Engine 29 rejects the API version 1.32 fallback that the docker-java
# shipped with Testcontainers 1.x negotiates (its hard floor is 1.40).
# Pinning a supported API version keeps Testcontainers working; remove this
# once the project moves to Testcontainers 2.x.
# https://github.com/testcontainers/testcontainers-java/issues/11235
api.version=1.44

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/quizchef_test}
    username: ${DB_USERNAME:quizchef}
    password: ${DB_PASSWORD:quizchef}

quizchef:
  security:
    jwt:
      secret: ${JWT_SECRET:quizchef-test-only-signing-secret-0001}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    # Off by default: integration tests share one cached Spring context (and
    # this bean's in-memory buckets) across many test methods and classes, so
    # a tight bucket exhausted by one test would spuriously fail an unrelated
    # later one. RateLimitingIntegrationTest re-enables it via a property
    # override, isolated in its own context, to prove the real 429 path works.
    rate-limit:
      enabled: false
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:quizchef}
    secret-key: ${MINIO_SECRET_KEY:quizchef-local}
    bucket: ${MINIO_BUCKET:quizchef-media-test}

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    io.quizchef: DEBUG

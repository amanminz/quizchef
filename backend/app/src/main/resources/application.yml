spring:
  application:
    name: quizchef
  profiles:
    default: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: quizchef
  flyway:
    locations: classpath:db/migration
    fail-on-missing-locations: true
    default-schema: quizchef
    schemas: quizchef

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  structured:
    format:
      # Elastic Common Schema: a neutral, widely-parseable JSON schema with
      # no assumed backend (RFC-010). Automatically includes MDC entries
      # (correlationId, requestId, identityId, sessionId, ...) as fields.
      console: ecs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: QuizChef
    version: 0.1.0-SNAPSHOT

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

quizchef:
  security:
    jwt:
      issuer: quizchef
      secret: ${JWT_SECRET}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT15M}
      audience: ${JWT_AUDIENCE:}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS}
    max-request-size-bytes: 262144
    rate-limit:
      default-rule:
        capacity: 60
        window: PT1M
      # Map keys with spaces/slashes need bracket notation or Spring Boot's
      # relaxed binding silently strips the special characters, mangling the
      # key into something that never matches (caught by
      # RateLimitingIntegrationTest before this comment existed).
      rules:
        "[POST /api/v1/auth/login]":
          capacity: 5
          window: PT1M
        "[POST /api/v1/auth/register]":
          capacity: 3
          window: PT1M
        "[POST /api/v1/sessions]":
          capacity: 10
          window: PT1M
        "[POST /api/v1/sessions/{pin}/join]":
          capacity: 10
          window: PT1M
        "[POST /api/v1/sessions/reconnect]":
          capacity: 10
          window: PT1M
        "[POST /api/v1/sessions/{id}/answers]":
          capacity: 20
          window: PT10S
        "[POST /api/v1/quizzes/{quizId}/publish]":
          capacity: 10
          window: PT1M
        "[POST /api/v1/users/me/host-access]":
          capacity: 3
          window: PT1M
  storage:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET}

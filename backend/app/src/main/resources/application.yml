spring:
  application:
    name: quizchef
  profiles:
    default: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: quizchef
  flyway:
    locations: classpath:db/migration
    fail-on-missing-locations: true
    default-schema: quizchef
    schemas: quizchef

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
  info:
    env:
      enabled: true

info:
  app:
    name: QuizChef
    version: 0.1.0-SNAPSHOT

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

quizchef:
  security:
    jwt:
      issuer: quizchef
      secret: ${JWT_SECRET}
      access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT15M}
      audience: ${JWT_AUDIENCE:}
  storage:
    endpoint: ${MINIO_ENDPOINT}
    access-key: ${MINIO_ACCESS_KEY}
    secret-key: ${MINIO_SECRET_KEY}
    bucket: ${MINIO_BUCKET}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/quizchef}
    username: ${DB_USERNAME:quizchef}
    password: ${DB_PASSWORD:quizchef}

management:
  endpoint:
    health:
      show-details: always

quizchef:
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:quizchef}
    secret-key: ${MINIO_SECRET_KEY:quizchef-local}
    bucket: ${MINIO_BUCKET:quizchef-media}

logging:
  level:
    io.quizchef: DEBUG

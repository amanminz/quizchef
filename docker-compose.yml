name: quizchef

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quizchef}
      POSTGRES_USER: ${POSTGRES_USER:-quizchef}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quizchef}
      POSTGRES_INITDB_ARGS: --encoding=UTF8
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - quizchef
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quizchef} -d ${POSTGRES_DB:-quizchef}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-quizchef}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-quizchef-local}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    networks:
      - quizchef
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-quizchef}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-quizchef-local}
      MINIO_BUCKET: ${MINIO_BUCKET:-quizchef-media}
    entrypoint:
      - /bin/sh
      - -c
      - >
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD" &&
        mc mb --ignore-existing "local/$$MINIO_BUCKET"
    networks:
      - quizchef

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-quizchef}
      DB_USERNAME: ${POSTGRES_USER:-quizchef}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-quizchef}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-quizchef}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-quizchef-local}
      MINIO_BUCKET: ${MINIO_BUCKET:-quizchef-media}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - quizchef
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-3000}:8080"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - quizchef
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  minio-data:

networks:
  quizchef:
    driver: bridge
